name: config-ui
on:
  push:
    branches: [main]
    paths:
      - 'config-ui/**'
  pull_request:
    branches: [main]
    paths:
      - 'config-ui/**'
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'yarn'
        cache-dependency-path: config-ui/yarn.lock
    - name: Install with Yarn
      working-directory: config-ui
      run: yarn install
    - name: Run tests with coverage
      working-directory: config-ui
      run: yarn test:coverage
    - name: Upload TypeScript coverage to Codecov
      if: always()
      uses: codecov/codecov-action@v5
      with:
        use_oidc: true
        flags: unit-tests-typescript
        files: ./config-ui/coverage/lcov.info
        fail_ci_if_error: false
